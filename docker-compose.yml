services:
  cooker:
    build: .
    container_name: mixvault
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/recipes.db
      - LOG_DIR=/data/logs
      - BACKUP_DIR=/data/backups
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/poll')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Caddy reverse proxy for HTTPS
  # Uncomment below if you want HTTPS with auto-certs
